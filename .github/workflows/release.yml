name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Какую часть версии увеличить (minor — обычный релиз, patch — хотфикс, major — ломающие изменения)"
        type: choice
        options:
          - minor
          - patch
          - major
        default: minor
        required: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep '^VERSION_NAME=' version.properties | cut -d= -f2)
          CODE=$(grep '^VERSION_CODE=' version.properties | cut -d= -f2)
          IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((CODE + 1))
          printf 'VERSION_NAME=%s\nVERSION_CODE=%s\n' "$NEW_VERSION" "$NEW_CODE" > version.properties
          echo "Releasing v$NEW_VERSION (versionCode $NEW_CODE)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect changelog
        id: changelog
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          shopt -s nullglob
          FILES=(changelogs/unreleased/*.md)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Технический релиз без изменений, заметных пользователю." > "$NOTES"
          else
            for f in "${FILES[@]}"; do
              cat "$f"
              echo
            done > "$NOTES"
          fi
          {
            echo "# Changelog"
            echo
            echo "## v${{ steps.version.outputs.version }} — $(date -u +%Y-%m-%d)"
            echo
            cat "$NOTES"
            echo
            # старые разделы CHANGELOG.md без заголовка "# Changelog" и пустой строки
            tail -n +3 CHANGELOG.md
          } | cat -s > "$RUNNER_TEMP/changelog-full.md"
          mv "$RUNNER_TEMP/changelog-full.md" CHANGELOG.md
          if [ ${#FILES[@]} -gt 0 ]; then
            git rm -q "${FILES[@]}"
          fi
          echo "notes_path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"
          else
            echo "Секрет KEYSTORE_BASE64 не задан — APK будет подписан debug-ключом"
          fi

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: >
          mv app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/release/smartalarm-v${{ steps.version.outputs.version }}.apk

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties CHANGELOG.md changelogs/unreleased
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          files: app/build/outputs/apk/release/smartalarm-v${{ steps.version.outputs.version }}.apk
