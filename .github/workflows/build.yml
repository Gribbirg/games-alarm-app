name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Snapshot APK
    runs-on: ubuntu-latest
    # push уже собирает каждый коммит этого репозитория; по событию
    # pull_request собираем только PR из форков, чтобы не дублировать сборки
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compute snapshot version
        id: version
        run: |
          BASE=$(grep '^VERSION_NAME=' version.properties | cut -d= -f2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=${BASE}-SNAPSHOT-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: ./gradlew test

      - name: Build snapshot APK
        run: >
          ./gradlew assembleDebug
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}

      - name: Rename APK
        run: >
          mv app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/smartalarm-${{ steps.version.outputs.name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartalarm-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/smartalarm-*.apk
